server.port=8080
spring.main.banner-mode=off

# ── PostgreSQL ──
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chawka}
spring.datasource.username=${DATABASE_USER:chawka}
spring.datasource.password=${DATABASE_PASSWORD:chawka}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.chawka=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.websocket=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# S3 object storage settings
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:${APP_S3_BUCKET:chawka-prod-files}}
app.storage.s3.region=${APP_STORAGE_S3_REGION:${APP_S3_REGION:eu-west-3}}
app.storage.s3.key-prefix=uploads
