# ── H2 in PostgreSQL-compatibility mode for tests ──
spring.datasource.url=jdbc:h2:mem:chawka_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Dummy S3 values (services that use S3 are mocked in tests)
app.storage.s3.bucket=test-bucket
app.storage.s3.region=us-east-1
app.storage.s3.key-prefix=test-uploads
