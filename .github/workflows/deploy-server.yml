name: Deploy Server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: mvn verify

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build server JAR
        run: mvn clean package -DskipTests

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Lightsail
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          # Upload JAR + docker-compose
          scp \
            target/chawka-server-1.0.0.jar \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/app.jar"

          scp \
            Dockerfile docker-compose.yml \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/"

          # Rebuild and restart with docker-compose
          ssh "${SERVER_USER}@${SERVER_HOST}" << 'EOF'
            cd ~/chawka-server
            sudo docker compose down chawka-server
            sudo docker compose up -d --build
            # Wait for startup and verify via stats endpoint
            sleep 12
            curl -sf http://localhost:8080/api/stats | grep -q '"status":"UP"' && echo "Deploy OK" || echo "Deploy FAILED"
          EOF
