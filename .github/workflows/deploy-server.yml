name: Deploy Server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn verify

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build server JAR
        run: mvn clean package -DskipTests

      - name: Deploy to Lightsail
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          # Upload JAR + docker-compose
          scp -i ~/.ssh/deploy_key \
            target/chawka-server-1.0.0.jar \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/app.jar"

          scp -i ~/.ssh/deploy_key \
            Dockerfile docker-compose.yml \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/"

          # Write .env and redeploy
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" bash -s << ENDSSH
            set -e
            cd ~/chawka-server
            printf 'POSTGRES_PASSWORD=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\n' \
              "${POSTGRES_PASSWORD}" "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}" > .env
            sudo docker compose down chawka-server
            sudo docker compose up -d --build
            sleep 15
            curl -sf http://localhost:8080/api/stats | grep -q '"status":"UP"' \
              && echo "Deploy OK" \
              || { echo "Deploy FAILED"; sudo docker logs chawka-server --tail 30; exit 1; }
          ENDSSH
