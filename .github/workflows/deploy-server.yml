name: Deploy Server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw verify

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build server JAR
        run: ./mvnw clean package -DskipTests

      - name: Validate deploy secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then missing="$missing SSH_PRIVATE_KEY"; fi
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then missing="$missing SERVER_HOST"; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then missing="$missing SERVER_USER"; fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then missing="$missing DB_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Deploy to Lightsail
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          # Upload JAR + docker-compose + Dockerfile
          scp -i ~/.ssh/deploy_key \
            target/chawka-server-1.0.0.jar \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/app.jar"

          scp -i ~/.ssh/deploy_key \
            Dockerfile docker-compose.yml \
            "${SERVER_USER}@${SERVER_HOST}:~/chawka-server/"

          # Write .env and redeploy
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" bash -s << ENDSSH
            set -e
            cd ~/chawka-server

            # Install Docker Compose plugin if not available
            if ! sudo docker compose version &>/dev/null; then
              echo "Installing Docker Compose plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              COMPOSE_VERSION=v2.36.1
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/\${COMPOSE_VERSION}/docker-compose-\$(uname -s)-\$(uname -m)" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              sudo docker compose version
            fi

            printf 'POSTGRES_PASSWORD=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\n' \
              "${POSTGRES_PASSWORD}" "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}" > .env
            # Only remove the app container — postgres keeps running with its data
            sudo docker stop chawka-server 2>/dev/null || true
            sudo docker rm chawka-server 2>/dev/null || true
            # Start postgres if not already running, then rebuild only the app
            sudo docker compose up -d postgres
            sudo docker compose up -d --build chawka-server
            sleep 15
            curl -sf http://localhost:8080/api/stats | grep -q '"status":"UP"' \
              && echo "Deploy OK" \
              || { echo "Deploy FAILED"; sudo docker compose logs chawka-server --tail 30; exit 1; }
          ENDSSH
