services:
  postgres:
    image: postgres:16-alpine
    container_name: chawka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chawka
      POSTGRES_USER: chawka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chawka"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chawka-server:
    build: .
    container_name: chawka-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/chawka
      DATABASE_USER: chawka
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

volumes:
  pgdata:
    external: true
    name: postgres_data
