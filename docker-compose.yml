version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chawka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chawka
      POSTGRES_USER: chawka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chawka_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chawka"]
      interval: 10s
      timeout: 5s
      retries: 5

  chawka-server:
    build: .
    container_name: chawka-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/chawka
      DATABASE_USER: chawka
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-chawka_secret_2026}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

volumes:
  pgdata:
